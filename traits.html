<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Symbapedia">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon_DA">
  <meta name="theme-color" content="#121416">
  <title>Symbapedia - Egenskaper</title>

  <style>html[data-preload] body { visibility:hidden; opacity:0; } html.is-ready body { visibility:visible; opacity:1; transition:opacity .2s; }</style>
  <script>document.documentElement.dataset.preload = "true";</script>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/auto-resize.js" defer></script>
  <script src="js/text-format.js" defer></script>
  <script src="js/utils.js" defer></script>
  <script src="js/store.js" defer></script>
  <script src="js/inventory-utils.js" defer></script>
  <script src="js/traits-utils.js" defer></script>
  <script src="js/summary-effects.js" defer></script>
  <script src="js/shared-toolbar.js" defer></script>
  <script src="js/yrke-panel.js" defer></script>
  <script src="js/tabell-popup.js" defer></script>
  <script src="js/pdf-library.js" defer></script>
  <script src="js/elite-utils.js" defer></script>
  <script src="js/elite-req.js" defer></script>
  <script src="js/entry-card.js" defer></script>
  <script src="js/jszip.min.js" defer></script>
  <script src="js/character-generator.js" defer></script>
  <script src="js/main.js" defer></script>
  <script src="js/exceptionellt.js" defer></script>
  <script src="js/djurmask.js" defer></script>
  <script src="js/beastform.js" defer></script>
  <script src="js/kraftval.js" defer></script>
  <script src="js/artifact-payment.js" defer></script>
  <script src="js/bloodbond.js" defer></script>
  <script src="js/monsterlard.js" defer></script>
  <script src="js/elite-add.js" defer></script>
  <script src="js/pwa.js" defer></script>
</head>
<body data-role="traits">

  <h1 class="app-title">EGENSKAPER</h1>

  <div id="activeFilters" class="tags"></div>

  <div class="panel traits-hub-panel">
    <div class="panel-header traits-hub-header">
      <div class="traits-hub-heading">
        <span id="traitsViewTitle" class="traits-view-title">Karaktärsdrag</span>
        <h2 id="charName" class="traits-view-name" aria-live="polite"></h2>
      </div>
      <div class="header-actions"></div>
    </div>

    <nav class="traits-tabs" aria-label="Egenskapsnavigering" role="tablist">
      <a id="traitsTabTraits" class="traits-tab active" href="#tab-traits" data-traits-tab="traits" role="tab" aria-controls="traitsTabPanel" aria-selected="true" aria-current="page">Karaktärsdrag</a>
      <a id="traitsTabSummary" class="traits-tab" href="#tab-summary" data-traits-tab="summary" role="tab" aria-controls="summaryTabPanel" aria-selected="false" tabindex="-1">Översikt</a>
      <a id="traitsTabEffects" class="traits-tab" href="#tab-effects" data-traits-tab="effects" role="tab" aria-controls="effectsTabPanel" aria-selected="false" tabindex="-1">Effekter</a>
    </nav>

    <div class="traits-tab-panels">
      <section id="traitsTabPanel" class="traits-tab-panel traits-content summary-content active" data-tab-panel="traits" role="tabpanel" aria-labelledby="traitsTabTraits">
        <section class="summary-section trait-xp-section">
          <div id="xpSummary" class="trait-xp-summary">
            <div class="trait-xp-header">
              <span class="trait-xp-title">Erfarenhet</span>
              <div class="xp-control trait-xp-buttons">
                <button id="xpMinus" class="char-btn icon icon-only" type="button" aria-label="Minska XP" title="Minska XP">
                  <img src="icons/minus.svg" alt="" class="btn-icon" width="32" height="32">
                </button>
                <input id="xpInput" type="number" min="0" value="0" aria-label="Totala erfarenhetspoäng">
                <button id="xpPlus" class="char-btn icon icon-only" type="button" aria-label="Öka XP" title="Öka XP">
                  <img src="icons/plus.svg" alt="" class="btn-icon" width="32" height="32">
                </button>
              </div>
            </div>
            <div class="trait-xp-row">
              <span class="trait-xp-item">
                <span class="trait-xp-label">TOTALT:</span>
                <span id="xpTotal" class="trait-xp-value">0</span>
              </span>
              <span class="trait-xp-item">
                <span class="trait-xp-label">ANVÄNT:</span>
                <span id="xpUsed" class="trait-xp-value">0</span>
              </span>
              <span class="trait-xp-item">
                <span class="trait-xp-label">OANVÄNT:</span>
                <span id="xpFree" class="trait-xp-value">0</span>
              </span>
            </div>
          </div>
        </section>

        <section class="summary-section trait-list-section">
          <div class="trait-meta">
            <div class="traits-total-row">
              <button id="defenseCalcBtn" class="char-btn icon defense-action-btn" type="button" data-action="open-defense-calc">
                <img src="icons/forsvar.svg" alt="" class="btn-icon" width="24" height="24">
                <span>Beräkna försvar</span>
              </button>
              <div class="traits-total" role="status">
                Karaktärsdrag: <span id="traitsTotal">0</span> / <span id="traitsMax">0</span>
              </div>
              <button id="resetTraits" class="char-btn icon icon-only danger traits-reset-btn" title="Återställ basegenskaper" aria-label="Återställ basegenskaper">
                <img src="icons/broom.svg" alt="" class="btn-icon" width="32" height="32">
              </button>
            </div>
            <div id="traitStats" class="trait-extra-meta" aria-live="polite"></div>
          </div>
          <div id="traits" class="traits-grid traits"></div>
        </section>
      </section>

      <section id="summaryTabPanel" class="traits-tab-panel summary-panel summary-content" data-tab-panel="summary" role="tabpanel" aria-labelledby="traitsTabSummary" hidden>
        <div id="summaryContent" class="summary-content"></div>
      </section>

      <section id="effectsTabPanel" class="traits-tab-panel effects-panel summary-content" data-tab-panel="effects" role="tabpanel" aria-labelledby="traitsTabEffects" hidden>
        <div id="effectsContent" class="summary-content"></div>
      </section>
    </div>
  </div>

  <shared-toolbar></shared-toolbar>

</body>
</html>
