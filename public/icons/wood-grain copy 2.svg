<svg xmlns="http://www.w3.org/2000/svg" width="400" height="160" viewBox="0 0 400 160" preserveAspectRatio="none">
  <defs>
    <linearGradient id="wood-base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#482b1f"/>
      <stop offset="34%" stop-color="#2a1811"/>
      <stop offset="100%" stop-color="#0f0907"/>
    </linearGradient>

    <linearGradient id="wood-sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4a06a" stop-opacity=".08"/>
      <stop offset="32%" stop-color="#f2c18b" stop-opacity=".12"/>
      <stop offset="58%" stop-color="#4f2f21" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0605" stop-opacity=".16"/>
    </linearGradient>

    <linearGradient id="wood-vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity=".02"/>
      <stop offset="45%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity=".28"/>
    </linearGradient>

    <pattern id="wood-rings" width="220" height="160" patternUnits="userSpaceOnUse">
      <rect width="220" height="160" fill="none"/>
      <path d="M-30 20C10 30 54 10 108 23s93 11 146 0 92-12 156 3" fill="none" stroke="#f2bf88" stroke-opacity=".09" stroke-width="9" stroke-linecap="round"/>
      <path d="M-24 48C12 58 58 39 110 49s91 10 144 0 91-11 154 3" fill="none" stroke="#f2bf88" stroke-opacity=".06" stroke-width="7" stroke-linecap="round"/>
      <path d="M-20 74C18 84 63 66 114 74s89 9 142 0 92-12 152 4" fill="none" stroke="#8e5f43" stroke-opacity=".18" stroke-width="10" stroke-linecap="round"/>
      <path d="M-28 100C11 112 57 90 110 101s93 11 148 0 92-13 158 2" fill="none" stroke="#f2bf88" stroke-opacity=".05" stroke-width="6" stroke-linecap="round"/>
      <path d="M-26 132C15 142 58 122 110 132s90 11 144 0 92-11 156 4" fill="none" stroke="#744b36" stroke-opacity=".20" stroke-width="8" stroke-linecap="round"/>
    </pattern>

    <filter id="wood-grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014 0.52" numOctaves="3" seed="17" result="noise"/>
      <feColorMatrix
        in="noise"
        type="matrix"
        values="0.85 0 0 0 0
                0 0.55 0 0 0
                0 0 0.30 0 0
                0 0 0 .70 0"
        result="grain"/>
      <feBlend in="SourceGraphic" in2="grain" mode="multiply"/>
    </filter>
  </defs>

  <rect width="400" height="160" fill="url(#wood-base)"/>
  <rect width="400" height="160" fill="url(#wood-sheen)"/>
  <rect width="400" height="160" fill="url(#wood-rings)"/>
  <rect width="400" height="160" fill="#2d170f" opacity=".32" filter="url(#wood-grain)"/>
  <rect width="400" height="160" fill="url(#wood-vignette)"/>
</svg>
