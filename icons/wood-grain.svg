<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="straight-grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.002 0.8" numOctaves="2" result="noise" />
      
      <feComponentTransfer in="noise" result="faintNoise">
        <feFuncA type="linear" slope="0.15" />
      </feComponentTransfer>
      
      <feBlend mode="multiply" in="faintNoise" in2="SourceGraphic" />
    </filter>

    <linearGradient id="panel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3c2d24" />   <stop offset="40%" stop-color="#554236" />  <stop offset="100%" stop-color="#362820" /> </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#panel-gradient)" filter="url(#straight-grain)" rx="6" />
</svg>
