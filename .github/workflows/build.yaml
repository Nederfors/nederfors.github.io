name: Build and deploy Symbapedia

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

# Do not interrupt an ongoing deployment if another push arrives.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Test and build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: symbapedia_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d symbapedia_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate catalogs and schemas
        run: npm run validate:data

      - name: Verify rule behavior
        run: npm run verify:rules

      - name: Lint source and tests
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit

      - name: Validate Drizzle migration metadata
        run: npm run db:check

      - name: Run disposable PostgreSQL migration integration
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/symbapedia_test
        run: npm run test:server:integration

      - name: Build production site
        run: python3 scripts/master_sync.py

      - name: Verify generated source is committed
        run: |
          changes="$(git status --porcelain --untracked-files=all)"

          if [ -n "$changes" ]; then
            echo "The production build changed committed source or generated files:"
            echo "$changes"
            echo "Run 'python3 scripts/master_sync.py', review the changes, and commit them before publishing."
            exit 1
          fi

      - name: Stamp deployment revision
        if: github.ref == 'refs/heads/main'
        run: printf '%s\n' "$GITHUB_SHA" > dist/deploy-revision.txt

      # ------------------------------------------------------------
      # GitHub Pages
      # ------------------------------------------------------------

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      # ------------------------------------------------------------
      # STRATO deployment artifact
      #
      # This contains the same finished dist/ website.
      # ------------------------------------------------------------

      - name: Save STRATO deployment artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: strato-site
          path: dist
          if-no-files-found: error
          retention-days: 7
          include-hidden-files: true


  # ==============================================================
  # Deploy to GitHub Pages
  # ==============================================================

  deploy-pages:
    name: Deploy to GitHub Pages

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4


  # ==============================================================
  # Deploy the SAME build to STRATO
  # ==============================================================

  deploy-strato:
    name: Deploy to STRATO

    if: >
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check STRATO configuration
        env:
          STRATO_HOST: ${{ secrets.STRATO_SFTP_HOST }}
          STRATO_USER: ${{ secrets.STRATO_SFTP_USER }}
          STRATO_PASSWORD: ${{ secrets.STRATO_SFTP_PASSWORD }}
        run: |
          missing=0

          if [ -z "$STRATO_HOST" ]; then
            echo "::error::STRATO_SFTP_HOST is not configured"
            missing=1
          fi

          if [ -z "$STRATO_USER" ]; then
            echo "::error::STRATO_SFTP_USER is not configured"
            missing=1
          fi

          if [ -z "$STRATO_PASSWORD" ]; then
            echo "::error::STRATO_SFTP_PASSWORD is not configured"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          echo "STRATO deployment configuration is present."

      - name: Download tested website
        uses: actions/download-artifact@v5
        with:
          name: strato-site
          path: dist

      - name: Install SFTP client
        run: |
          sudo apt-get update
          sudo apt-get install --yes lftp

      - name: Add STRATO host key
        env:
          STRATO_HOST: ${{ secrets.STRATO_SFTP_HOST }}
        run: |
          mkdir -p "$HOME/.ssh"
          ssh-keyscan -p 22 "$STRATO_HOST" >> "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Deploy website to STRATO
        env:
          STRATO_HOST: ${{ secrets.STRATO_SFTP_HOST }}
          STRATO_USER: ${{ secrets.STRATO_SFTP_USER }}
          STRATO_PASSWORD: ${{ secrets.STRATO_SFTP_PASSWORD }}
        run: |
          lftp -u "$STRATO_USER","$STRATO_PASSWORD" "sftp://$STRATO_HOST" <<'LFTP'
          set cmd:fail-exit yes
          set net:max-retries 2
          set net:timeout 30
          set sftp:connect-program "ssh -a -x -p 22 -o StrictHostKeyChecking=yes"

          mirror \
            --reverse \
            --delete \
            --verbose \
            --parallel=4 \
            dist/ .

          bye
          LFTP
