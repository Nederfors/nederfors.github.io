name: Build and deploy Symbapedia

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate catalogs and schemas
        run: npm run validate:data

      - name: Verify rule behavior
        run: npm run verify:rules

      - name: Lint source and tests
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit

      - name: Build production site
        run: python3 scripts/master_sync.py

      - name: Verify generated source is committed
        run: |
          changes="$(git status --porcelain --untracked-files=all)"
          if [ -n "$changes" ]; then
            echo "The production build changed committed source or generated files:"
            echo "$changes"
            echo "Run 'python3 scripts/master_sync.py', review the changes, and commit them before publishing."
            exit 1
          fi

      - name: Stamp deployment revision
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: printf '%s\n' "$GITHUB_SHA" > dist/deploy-revision.txt

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
