<!DOCTYPE html>
<html lang="sv" data-theme="grunge-dark" data-db-texture="grain">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Symbapedia">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon_DA">
  <meta name="theme-color" content="#121416">
  <title>Symbapedia</title>

  <style>
    html[data-preload] body { visibility:hidden; opacity:0; }
    html.is-ready body { visibility:visible; opacity:1; transition:opacity .2s; }
    .boot-fallback {
      width: min(40rem, calc(100vw - 2rem));
      margin: 12vh auto 0;
      padding: 1rem 1.2rem;
      border: 1px solid var(--db-color-border, rgba(255, 243, 228, 0.12));
      border-radius: 1rem;
      background: var(--db-color-surface, rgba(25, 21, 18, 0.96));
      color: var(--db-color-text, #fff3e4);
      box-shadow: var(--db-shadow-2, 0 18px 40px rgba(0, 0, 0, 0.32));
      font: 500 1rem/1.5 var(--db-font-ui, "Avenir Next", "Segoe UI", sans-serif);
    }
    .boot-fallback[hidden] { display: none; }
    .boot-fallback code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.95em;
    }
  </style>
  <script>
    document.documentElement.dataset.preload = "true";
    window.__symbaroumShowBootFallback = function(message) {
      if (window.__symbaroumBootCompleted) return;
      document.documentElement.classList.add('is-ready');
      document.documentElement.removeAttribute('data-preload');
      const fallback = document.getElementById('boot-fallback');
      if (!fallback) return;
      fallback.hidden = false;
      fallback.innerHTML = message;
    };
    document.addEventListener('DOMContentLoaded', () => {
      if (window.location.protocol === 'file:') {
        window.setTimeout(() => {
          window.__symbaroumShowBootFallback(
            'This shell must be served over <code>http://</code>.<br>Run <code>npm run dev</code> or <code>npm run preview</code> in the repo root.'
          );
        }, 100);
        return;
      }
      window.setTimeout(() => {
        if (!window.__symbaroumBootCompleted && document.documentElement.dataset.preload === 'true') {
          window.__symbaroumShowBootFallback(
            'The app shell did not finish booting. Check the browser console for the failing asset or script.'
          );
        }
      }, 8000);
    });
  </script>
  <script type="importmap">
    {
      "imports": {
        "ssr-window": "./js/vendor/ssr-window.js"
      }
    }
  </script>
  <link rel="stylesheet" href="css/style.css">
  <script type="module" src="js/app-bootstrap.js"></script>
</head>
<body data-role="index">

  <div id="boot-fallback" class="boot-fallback" hidden></div>
  <div id="view-root"></div>

  <!-- Gemensam toolbar + paneler -->
  <shared-toolbar></shared-toolbar>

</body>
</html>
